<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Rhythm | DJ Sets & Clubbing</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #050C1F;
            --bg-surface: #0A1433;
            --bg-card: #080E24;
            --accent: #FFBF00;
            --magenta: #8B008B;
            --magenta-glow: rgba(139, 0, 139, 0.4);
            --text-light: #F4F4F5;
            --text-muted: #A1A1AA;
            --font-title: 'Playfair Display', serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-ui: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-base);
            color: var(--text-light);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        h1, h2, h3 { font-family: var(--font-title); }
        a { text-decoration: none; color: inherit; }

        .portal-header {
            background: var(--bg-base);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 100;
        }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: rgba(10, 20, 51, 0.95);
        }

        .logo-container h1 {
            color: var(--accent); font-size: 1.8rem; letter-spacing: 1px;
            display: flex; align-items: center; gap: 10px;
        }

        /* --- Navegación Unificada --- */
        .category-nav {
            display: flex; gap: 2rem; padding: 0.8rem 5%;
            background: rgba(5, 12, 31, 0.95); font-family: var(--font-ui);
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
            overflow-x: auto; white-space: nowrap;
        }

        .category-nav a {
            color: var(--text-muted); transition: all 0.3s ease;
            padding-bottom: 5px; border-bottom: 2px solid transparent;
        }

        .category-nav a:hover, .category-nav a.active {
            color: var(--accent) !important;
            border-bottom: 2px solid var(--accent) !important;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 191, 0, 0.3);
        }

        .page-header {
            padding: 3rem 5% 2rem; text-align: center;
            background: radial-gradient(ellipse at top, var(--bg-surface) 0%, var(--bg-base) 100%);
            border-bottom: 1px solid rgba(139, 0, 139, 0.2); position: relative;
        }

        .page-header h2 {
            font-size: 3.5rem; color: var(--text-light); margin-bottom: 0.5rem;
            text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 20px var(--magenta-glow);
        }
        
        .page-header p {
            color: var(--text-muted); font-family: var(--font-ui);
            font-size: 1.1rem; max-width: 700px; margin: 0 auto;
        }

        .clubbing-grid { padding: 2rem 5% 4rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }

        .dj-card {
            background: var(--bg-card); border-radius: 4px; overflow: hidden;
            position: relative; border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .dj-card:hover { transform: translateY(-8px); border-color: var(--magenta); box-shadow: 0 15px 30px var(--magenta-glow); }

        .time-badge {
            position: absolute; top: 1rem; right: 1rem; background: var(--accent);
            color: var(--bg-base); font-family: var(--font-ui); font-weight: 800;
            font-size: 1.1rem; padding: 0.4rem 0.8rem; border-radius: 4px; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .dj-image-container { height: 220px; position: relative; overflow: hidden; }
        .dj-image-container img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.3); transition: filter 0.4s ease, transform 0.4s ease; }
        .dj-card:hover .dj-image-container img { filter: grayscale(0%); transform: scale(1.08); }

        .dj-info { padding: 1.5rem; }
        .dj-info h3 { font-size: 1.6rem; color: white; margin-bottom: 0.5rem; }
        .dj-venue { font-family: var(--font-ui); color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <header class="portal-header">
        <div class="top-bar">
            <div class="logo-container">
                <h1>BLUE RHYTHM <span style="font-size: 0.9rem; font-family: var(--font-ui); font-weight: normal; color: var(--text-muted);">| Cartelera 2026</span></h1>
            </div>
        </div>
        <nav class="category-nav">
            <a href="index.html">Todos los Eventos</a>
            <a href="conciertos.html">Conciertos Estelares</a>
            <a href="dj-sets.html" class="active">DJ Sets (Clubbing)</a>
            <a href="masterclass.html">Masterclasses</a>
            <a href="gastronomia.html">Gastronomía</a>
            <a href="boletos.html">Comprar Boletos</a>
        </nav>
    </header>

    <section class="page-header">
        <h2>La Pista de Baile</h2>
        <p>Cuando los metales en vivo se apagan, los sintetizadores toman el control.</p>
    </section>

    <section class="clubbing-grid">
        <article class="dj-card">
            <div class="time-badge">23:30</div>
            <div class="dj-image-container">
                <img src="https://picsum.photos/seed/techno/600/400" alt="DJ Motor City">
            </div>
            <div class="dj-info">
                <div class="dj-venue">📍 Neon Club Tent • Viernes</div>
                <h3>Motor City Drum Ensemble</h3>
            </div>
        </article>
    </section>
</body>
</html>
